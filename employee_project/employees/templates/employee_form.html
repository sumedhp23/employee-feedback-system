<!DOCTYPE html>
<html>
<head>

<title>Employee Feedback</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f4f4;
font-family: "Segoe UI", sans-serif;
}

.header{
background:#111;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:600;
letter-spacing:1px;
}

.form-card{
background:white;
border-radius:10px;
padding:40px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.section-title{
font-weight:600;
margin-bottom:20px;
color:#333;
}

.btn-submit{
background:#c8102e;
border:none;
padding:10px 30px;
font-weight:500;
}

.btn-submit:hover{
background:#a10d24;
}

</style>

</head>

<body>

<div class="header">
Employee Feedback System
</div>

<div class="container mt-5">

<div class="form-card">

<h3 class="section-title text-center">Submit Employee Feedback</h3>

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Employee Name</label>
{{ form.employee_name }}
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Employee ID</label>
{{ form.employee_id }}
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Department</label>
{{ form.department }}
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Email</label>
{{ form.email }}
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Phone Number</label>
{{ form.phone }}
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Joining Date</label>
{{ form.joining_date }}
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Experience (Years)</label>
{{ form.experience }}
</div>

<div class="col-12 mb-3">
<label class="form-label">Feedback</label>
{{ form.feedback }}
</div>

<div class="col-12 mb-3">
<label class="form-label">Recommendations</label>
{{ form.recommendations }}
</div>

</div>

<div class="text-center mt-4">

<button class="btn btn-submit text-white">
Submit Feedback
</button>

</div>

</form>

</div>

</div>

</body>
</html>
